# Reusable security workflow — gitleaks (secrets) + npm audit (deps) + CodeQL (SAST).
# Called by each repo's .github/workflows/security.yml as `uses:`.
#
# Design goals:
#  - Never block merges on infra/licensing gaps we don't control. Secret + SAST
#    findings should surface as warnings/annotations, not hard CI failures, until
#    the org enables the corresponding paid/repo-level features.
name: security-shared
on:
  workflow_call:
    inputs:
      language:
        type: string
        default: "javascript-typescript"
      skip-codeql:
        type: boolean
        default: false

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Surface the secret into a job-level env var so step `if:` conditions can read
    # it (GitHub Actions forbids `secrets.*` directly inside `if:`).
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      # gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for ORG repos. When the
      # license secret is present, use the action (richer reporting). Otherwise fall
      # back to the free open-source gitleaks binary so secret scanning still runs.
      - name: gitleaks (licensed action)
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      - name: gitleaks (free binary fallback)
        if: ${{ env.GITLEAKS_LICENSE == '' }}
        shell: bash
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          # Advisory: report findings but do not fail the workflow. Hard-blocking on
          # secret detection without triage/allowlisting causes false-positive churn.
          /tmp/gitleaks detect --source . --redact --no-banner --exit-code 0 \
            --report-format sarif --report-path gitleaks.sarif || true
          COUNT=$(jq '[.runs[]?.results[]?] | length' gitleaks.sarif 2>/dev/null || echo 0)
          echo "gitleaks: $COUNT potential finding(s)"
          if [ "$COUNT" -gt "0" ]; then
            echo "::warning::gitleaks flagged $COUNT potential secret(s) — review gitleaks.sarif"
          fi

  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "9" }
      # No `cache: pnpm` here: the audit doesn't need a warm store and the cache
      # Post-step has been flaky (fails the job after an otherwise-green audit).
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Audit (advisory only — never fails the workflow)
        shell: bash
        run: |
          # Advisory: print but don't fail. Real fix path is Dependabot PRs.
          pnpm audit --prod --json > audit.json 2>&1 || true
          HIGH=$(jq '[.advisories[]? | select(.severity=="high")] | length' audit.json 2>/dev/null || echo 0)
          CRIT=$(jq '[.advisories[]? | select(.severity=="critical")] | length' audit.json 2>/dev/null || echo 0)
          echo "Audit: $CRIT critical, $HIGH high"
          if [ "$CRIT" -gt "0" ]; then
            echo "::warning::$CRIT critical npm advisories — open a Dependabot PR or update manually"
          fi

  codeql:
    if: ${{ !inputs.skip-codeql }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}
      # SARIF upload requires "Code Security" (code scanning) enabled on the repo.
      # When it's off, analyze runs fine but the upload errors with a configuration
      # error. continue-on-error keeps the gate green; findings still upload once the
      # repo setting is enabled. Flip this to a hard failure org-wide after enabling.
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:${{ inputs.language }}"
